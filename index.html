<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            padding: 0;
        }
        .game-card {
            transition: transform 0.2s;
            position: relative;
        }
        .game-card:hover {
            transform: scale(1.02);
        }
        .game-card .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .game-card:hover .overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .play-btn {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: none;
            cursor: pointer;
        }
        .play-btn:hover {
            transform: scale(1.15);
            background: #2563eb;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        #game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="main-ui">
        <header class="bg-black p-6 border-b border-blue-500/20 shadow-xl">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-black tracking-tighter">Nexus<span class="text-blue-500">Games</span></h1>
                <div class="flex gap-4">
                    <input type="text" id="search" placeholder="Search games..." oninput="render()" class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="toggleStealth()" class="bg-zinc-900 p-2 rounded-lg hover:bg-zinc-800 text-blue-500">
                        <i data-lucide="ghost"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-8">
            <div id="featured-section" class="mb-12 hidden">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="star" class="text-yellow-400 fill-yellow-400"></i>
                    FEATURED GAME
                </h2>
                <div id="featured-game" class="w-full"></div>
            </div>

            <h2 class="text-xl font-bold mb-6 text-zinc-400 uppercase tracking-widest text-sm">All Games</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Games here -->
            </div>
        </main>
    </div>

    <div id="game-container">
        <div class="absolute top-4 left-4 z-50 flex gap-2">
            <button onclick="closeGame()" class="bg-zinc-900/80 hover:bg-zinc-900 p-3 rounded-full text-blue-500 backdrop-blur-sm transition-all hover:scale-110 active:scale-95" title="Close Game">
                <i data-lucide="arrow-left"></i>
            </button>
            <button onclick="reloadGame()" class="bg-zinc-900/80 hover:bg-zinc-900 p-3 rounded-full text-blue-500 backdrop-blur-sm transition-all hover:scale-110 active:scale-95" title="Reload Game">
                <i data-lucide="refresh-cw"></i>
            </button>
        </div>
        <iframe id="game-iframe" src=""></iframe>
    </div>

    <script>
        // Initialize votes from localStorage or default to 0
        const savedVotes = JSON.parse(localStorage.getItem('nexus_votes') || '{}');

        const GAMES = [
            { title: 'Basket Random', url: 'https://www.twoplayergames.org/gameframe/basket-random', img: 'https://picsum.photos/seed/basket/400/250' },
            { title: 'Soccer Random', url: 'https://www.twoplayergames.org/gameframe/soccer-random', img: 'https://picsum.photos/seed/soccer/400/250' },
            { title: 'Boxing Random', url: 'https://www.twoplayergames.org/gameframe/boxing-random', img: 'https://picsum.photos/seed/boxing/400/250' },
            { title: 'Retro Bowl', url: 'https://www.twoplayergames.org/gameframe/retro-bowl', img: 'https://picsum.photos/seed/retro/400/250' },
            { title: 'BitLife', url: 'https://www.twoplayergames.org/gameframe/bitlife', img: 'https://picsum.photos/seed/bitlife/400/250' },
            { title: '1v1.lol', url: 'https://www.twoplayergames.org/gameframe/1v1-lol', img: 'https://picsum.photos/seed/1v1/400/250' },
            { title: 'Slope', url: 'https://www.twoplayergames.org/gameframe/slope', img: 'https://picsum.photos/seed/slope/400/250' },
            { title: 'Tunnel Rush', url: 'https://www.twoplayergames.org/gameframe/tunnel-rush', img: 'https://picsum.photos/seed/tunnel/400/250' },
            { title: 'Drift Hunters', url: 'https://www.twoplayergames.org/gameframe/drift-hunters', img: 'https://picsum.photos/seed/drift/400/250' },
            { title: 'Moto X3M', url: 'https://www.twoplayergames.org/gameframe/moto-x3m', img: 'https://picsum.photos/seed/moto/400/250' }
        ].map(g => ({ ...g, votes: savedVotes[g.title] || 0 }));

        let currentUrl = '';

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid');
            const featuredSection = document.getElementById('featured-section');
            const featuredGameContainer = document.getElementById('featured-game');

            // Find featured game (highest votes, must be > 0)
            const sortedByVotes = [...GAMES].sort((a, b) => b.votes - a.votes);
            const topGame = sortedByVotes[0];

            if (topGame && topGame.votes > 0 && !query) {
                featuredSection.classList.remove('hidden');
                featuredGameContainer.innerHTML = `
                    <div class="game-card bg-zinc-900 rounded-2xl overflow-hidden border border-blue-500/30 group flex flex-col md:flex-row h-auto md:h-64 shadow-2xl shadow-blue-500/10">
                        <div class="relative w-full md:w-1/2 h-48 md:h-full">
                            <img src="${topGame.img}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                            <div class="overlay">
                                <button class="play-btn" onclick="play('${topGame.url}')">Play Featured Game</button>
                            </div>
                        </div>
                        <div class="p-8 flex flex-col justify-center flex-1 bg-gradient-to-br from-zinc-900 to-black">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-blue-500 text-xs font-bold tracking-widest uppercase mb-2 block">Top Rated</span>
                                    <h3 class="text-3xl font-black tracking-tight text-white">${topGame.title}</h3>
                                </div>
                                <div class="flex flex-col items-center bg-zinc-800/50 p-3 rounded-xl border border-zinc-700">
                                    <button onclick="vote('${topGame.title}', 1)" class="text-zinc-400 hover:text-blue-500 transition-colors">
                                        <i data-lucide="chevron-up" class="w-6 h-6"></i>
                                    </button>
                                    <span class="font-bold text-xl text-blue-400 my-1">${topGame.votes}</span>
                                    <button onclick="vote('${topGame.title}', -1)" class="text-zinc-400 hover:text-red-500 transition-colors">
                                        <i data-lucide="chevron-down" class="w-6 h-6"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-zinc-400 text-sm mb-6 line-clamp-2">The community's current favorite. Jump in and see why everyone is playing ${topGame.title}!</p>
                            <button onclick="play('${topGame.url}')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all w-fit flex items-center gap-2">
                                <i data-lucide="play" class="fill-current w-4 h-4"></i>
                                PLAY NOW
                            </button>
                        </div>
                    </div>
                `;
            } else {
                featuredSection.classList.add('hidden');
            }

            const filteredGames = GAMES.filter(g => g.title.toLowerCase().includes(query));
            
            grid.innerHTML = filteredGames.map(g => `
                <div class="game-card bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-blue-500 group">
                    <div class="relative">
                        <img src="${g.img}" class="w-full h-40 object-cover" referrerPolicy="no-referrer">
                        <div class="overlay">
                            <button class="play-btn" onclick="play('${g.url}')">Play Game</button>
                        </div>
                    </div>
                    <div class="p-4 flex items-center justify-between">
                        <h3 class="font-bold text-zinc-100 truncate mr-2">${g.title}</h3>
                        <div class="flex items-center gap-2 bg-black/40 px-2 py-1 rounded-lg border border-zinc-800">
                            <button onclick="vote('${g.title}', 1)" class="text-zinc-500 hover:text-blue-500 transition-colors">
                                <i data-lucide="chevron-up" class="w-4 h-4"></i>
                            </button>
                            <span class="text-xs font-mono font-bold ${g.votes >= 0 ? 'text-blue-400' : 'text-red-400'} min-w-[1.5rem] text-center">${g.votes}</span>
                            <button onclick="vote('${g.title}', -1)" class="text-zinc-500 hover:text-red-500 transition-colors">
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function vote(title, delta) {
            const game = GAMES.find(g => g.title === title);
            if (game) {
                game.votes += delta;
                
                // Save to localStorage
                const votesToSave = {};
                GAMES.forEach(g => {
                    if (g.votes !== 0) votesToSave[g.title] = g.votes;
                });
                localStorage.setItem('nexus_votes', JSON.stringify(votesToSave));
                
                render();
            }
        }

        function play(url) {
            currentUrl = url;
            document.getElementById('game-iframe').src = url;
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
        }

        function closeGame() {
            document.getElementById('game-iframe').src = '';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        function reloadGame() {
            const iframe = document.getElementById('game-iframe');
            if (iframe.src) {
                const url = iframe.src;
                iframe.src = '';
                iframe.src = url;
            }
        }

        function toggleStealth() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.inset = '0';
            overlay.style.zIndex = '9999';
            overlay.style.background = 'white';
            overlay.innerHTML = '<iframe src="https://classroom.google.com" style="width:100%;height:100%;border:none;"></iframe>';
            document.body.appendChild(overlay);
            document.title = "Google Classroom";
            
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    overlay.remove();
                    document.title = "Unblocked Games";
                }
            }, { once: true });
        }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
